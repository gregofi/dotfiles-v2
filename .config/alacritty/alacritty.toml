[general]
import = [
    "~/.config/alacritty/themes/rosepine.toml"
]

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 11.0

[env]
WINIT_X11_SCALE_FACTOR = "1.1"

[terminal]
shell = "/usr/bin/fish"

[keyboard]
bindings = [
   { key = "Return", mods = "Super|Shift", action = "SpawnNewInstance" },
   # { key = "Return", mods = "Shift", chars = "\x1b\r" },
]
